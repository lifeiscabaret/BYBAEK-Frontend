name: Build and deploy Node.js app to Azure Web App - Bybaek-F

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: npm install and build
        env:
          NEXT_PUBLIC_INSTAGRAM_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_INSTAGRAM_CLIENT_ID }}
        run: |
          npm ci
          npm run build --if-present

      - name: Copy static files into standalone
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .next/standalone
          include-hidden-files: true

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_3F0C3771CFEF46D5B00B73A79204372A }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_8BA276A1279B4B67B4BE02B40F81ECBB }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_8391F7C9116444E7B23927DFA4950D84 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'Bybaek-F'
          slot-name: 'Production'
          package: .